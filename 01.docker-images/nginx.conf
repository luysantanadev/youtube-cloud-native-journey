# Configuracao nginx para rodar na porta 8080 como usuario nao-root.
# Os diretorios temporarios sao redirecionados para /tmp, que e gravavel sem privilegios.

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Diretorios de cache temporario gravados em /tmp (nao exige root).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen  8080;
        root    /usr/share/nginx/html;
        index   index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
