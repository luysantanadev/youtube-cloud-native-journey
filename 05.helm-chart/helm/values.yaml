# Default values for nuxt-workshop.
# Modifique este arquivo para personalizar a instalação do chart.
# Todos os valores aqui podem ser sobrescritos com: helm upgrade --install -f meu-valores.yaml ...

# Número inicial de réplicas do Deployment. O HPA pode ajustar dinamicamente quando habilitado.
replicaCount: 2

# Imagem Docker da aplicação Nuxt Workshop.
# Fluxo completo para o registry local k3d:
#   docker build -t nuxt-workshop:1.0.0 .
#   docker tag  nuxt-workshop:1.0.0 localhost:5001/nuxt-workshop:1.0.0
#   docker push localhost:5001/nuxt-workshop:1.0.0
#
# Dentro do cluster, os nodes puxam a imagem via workshop-registry.localhost:5001
# (endereço interno equivalente ao localhost:5001 externo).
# O k3d configura o registries.yaml em todos os nodes automaticamente na criação.
image:
  repository: workshop-registry.localhost:5001/nuxt-workshop
  # Always: força pull a cada reinicialização — útil durante o desenvolvimento iterativo.
  # IfNotPresent: usa cache local do node — use em produção com tags fixas.
  pullPolicy: Always
  # Tag da imagem. Vazio usa o appVersion do Chart.yaml.
  tag: "1.0.0"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# ServiceAccount dedicado para a aplicação (boas práticas de RBAC).
serviceAccount:
  # Cria um ServiceAccount exclusivo para esta release
  create: true
  # false: a aplicação não precisa acessar a API do Kubernetes
  automount: false
  # Annotations extras — útil para IRSA (AWS) ou Workload Identity (GCP)
  annotations: {}
  # Nome fixo do ServiceAccount. Se vazio, gerado automaticamente via fullname.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations:
  # Pyroscope continuous profiling — scrape CPU and memory profiles from port 3000
  profiles.grafana.com/cpu.scrape: "true"
  profiles.grafana.com/memory.scrape: "true"
  profiles.grafana.com/cpu.port: "3000"
  profiles.grafana.com/memory.port: "3000"
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# Variáveis de ambiente individuais extras (além das injetadas via configMap e secret).
# Use secretKeyRef aqui para referenciar Secrets externos não gerenciados por este chart.
env: []

# Contexto de segurança do Pod — aplicado ao processo como um todo.
podSecurityContext:
  runAsNonRoot: true  # impede execução como root no host
  runAsUser: 1000     # UID do usuário "node" na imagem node:alpine

# Contexto de segurança do container — restringe capacidades do processo.
securityContext:
  allowPrivilegeEscalation: false
  # false: Nuxt/Nitro grava arquivos de cache em disco durante a execução
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Porta que o container da aplicação escuta internamente.
# A app Nuxt/Nitro lê a variável PORT para determinar em qual porta ouvir.
containerPort: 3000

# Configuração não-sensível injetada via ConfigMap + envFrom.
# NÃO coloque senhas, tokens ou chaves de API aqui — use a seção `secret` abaixo.
configMap:
  enabled: true
  data:
    # URL pública usada pela app para gerar links absolutos e OG images
    NUXT_PUBLIC_SITE_URL: "http://nuxt-workshop.local"
    # Modo de execução do Node.js
    NODE_ENV: "production"
    # Interface de rede — 0.0.0.0 aceita conexões de qualquer origem
    HOST: "0.0.0.0"
    # Porta interna do servidor Nitro (deve corresponder a containerPort acima)
    PORT: "3000"
    # Identificação desta aplicação nos traces e métricas do OpenTelemetry
    OTEL_SERVICE_NAME: "nuxt-workshop"
    OTEL_SERVICE_VERSION: "1.0.0"
    # Endpoint do coletor OTLP — Alloy no namespace monitoring
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
    OTEL_LOG_LEVEL: "info"

# Configuração sensível armazenada em um Kubernetes Secret.
# Os valores são plaintext aqui — Kubernetes faz o encode base64 via stringData.
# Em produção: use External Secrets Operator + HashiCorp Vault ou AWS Secrets Manager.
secret:
  enabled: true
  data:
    # String de conexão com o banco PostgreSQL
    DATABASE_URL: "postgresql://user:password@postgres:5432/workshop"

# Service expõe os Pods como um endpoint de rede estável dentro do cluster.
service:
  # ClusterIP: acessível apenas dentro do cluster (padrão e mais seguro)
  type: ClusterIP
  # Porta exposta pelo Service — tráfego redirecionado para containerPort via named port "http"
  port: 80

# Ingress roteia tráfego HTTP/HTTPS externo para o Service interno.
# Pré-requisito: Ingress Controller instalado. k3d usa Traefik por padrão.
#
# Para acessar localmente, adicione ao arquivo hosts do Windows:
#   C:\Windows\System32\drivers\etc\hosts
#   127.0.0.1  nuxt-workshop.local
ingress:
  enabled: true
  # "traefik" é o Ingress Controller padrão do k3d
  # Substitua por "nginx" se estiver usando NGINX Ingress Controller
  className: "traefik"
  annotations: {}
  hosts:
    - host: nuxt-workshop.local
      paths:
        - path: /
          pathType: Prefix
  # tls: habilite para HTTPS com cert-manager ou certificado manual
  tls: []

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - nuxt-workshop.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

# Recursos de CPU e memória para cada Pod.
# requests: mínimo garantido para o scheduler alocar o Pod em um node.
# limits:   máximo permitido — exceder memória resulta em OOMKill.
resources:
  requests:
    cpu: "100m"     # 100 milliCPU = 10% de 1 core
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# livenessProbe: reinicia o container se a app travar (deadlock, estado inválido).
# Aumente initialDelaySeconds se a app demorar para inicializar e gerar falso-positivo.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  failureThreshold: 3

# readinessProbe: remove o Pod do pool do Service até estar pronto para receber tráfego.
# Essencial para zero-downtime durante rolling updates.
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

# HPA: escala automaticamente as réplicas com base no uso de CPU.
# Pré-requisito: metrics-server instalado no cluster.
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

