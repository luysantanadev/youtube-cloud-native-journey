{{- if .Values.secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helm.fullname" . }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}
# Opaque é o tipo padrão para dados arbitrários.
type: Opaque
# stringData recebe valores em plaintext — o Kubernetes faz o encode base64 internamente.
# Nunca use `data` com valores hardcoded em base64 que fiquem expostos no repositório.
stringData:
  {{- toYaml .Values.secret.data | nindent 2 }}
{{- end }}
