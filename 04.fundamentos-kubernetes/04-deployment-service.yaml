# =============================================================================
# 04 - Deployment + Service
# =============================================================================
# Service: expõe um conjunto de Pods como um endpoint de rede estável.
#   Sem Service, os Pods só são acessíveis pelo IP interno — que muda a cada
#   reinicialização. O Service resolve isso com um IP virtual permanente.
#
#   Tipos de Service:
#     ClusterIP    (padrão) — acessível apenas dentro do cluster
#     NodePort     — expõe uma porta em todos os nodes (acesso externo simples)
#     LoadBalancer — provisiona IP externo via cloud provider
#     ExternalName — mapeia para um DNS externo
#
#   O Service usa o selector de labels para descobrir automaticamente os Pods
#   saudáveis e distribuir o tráfego entre eles (load balancing round-robin).
#
# Comandos úteis:
#   kubectl apply -f 04-deployment-service.yaml
#   kubectl get services
#   kubectl describe service workshop-service
#   kubectl get endpoints workshop-service
#   kubectl port-forward service/workshop-service 8080:80
#   # Acessa no browser: http://localhost:8080
#   kubectl delete -f 04-deployment-service.yaml
# =============================================================================

# --- Deployment --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-deployment-service
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nuxt-workshop
  template:
    metadata:
      labels:
        app: nuxt-workshop
        version: "1.0.0"
    spec:
      containers:
        - name: nuxt-workshop
          image: workshop-registry.localhost:5001/nuxt-workshop:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: "postgresql://user:password@postgres:5432/workshop"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

---

# --- Service -----------------------------------------------------------------
# O selector do Service DEVE corresponder exatamente aos labels dos Pods.
# Inspecionar os endpoints gerados: kubectl get endpoints workshop-service
apiVersion: v1
kind: Service
metadata:
  name: workshop-service
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  # ClusterIP: acessível dentro do cluster pelo DNS workshop-service:80
  type: ClusterIP
  # Kubernetes monitora os Pods com esse label e atualiza os endpoints sozinho
  selector:
    app: nuxt-workshop
  ports:
    - name: http
      protocol: TCP
      port: 80          # porta exposta pelo Service dentro do cluster
      targetPort: 3000  # porta que o container da app realmente escuta
