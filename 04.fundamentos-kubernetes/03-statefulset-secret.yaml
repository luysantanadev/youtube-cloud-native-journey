# =============================================================================
# 03 - StatefulSet + Secret
# =============================================================================
# Secret: armazena dados sensíveis codificados em base64.
#   ⚠️ base64 NÃO é criptografia — é apenas encoding legível por máquina.
#   Em produção: habilite Encryption at Rest no etcd OU use soluções externas
#   como External Secrets Operator + HashiCorp Vault / AWS Secrets Manager.
#
#   Gerar base64 no PowerShell:
#     [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("minha-senha"))
#   Gerar base64 no Linux/Mac:
#     echo -n "minha-senha" | base64
#
# StatefulSet: como o Deployment, garante identidade estável para cada Pod:
#   - Nome previsível: workshop-statefulset-0, workshop-statefulset-1 ...
#   - Endereço DNS estável por Pod: <pod>.<headless-service>.<namespace>.svc.cluster.local
#   - Volume persistente individual por Pod (não compartilhado entre réplicas)
#   - Pods são criados e destruídos em ordem sequencial (0, 1, 2...)
#
# QUANDO USAR: bancos de dados, filas de mensagens, qualquer app com estado.
#
# Comandos úteis:
#   kubectl apply -f 03-statefulset-secret.yaml
#   kubectl get statefulsets
#   kubectl get pods -l app=nuxt-workshop-statefulset
#   kubectl get pvc
#   kubectl exec -it workshop-statefulset-0 -- sh
#   kubectl delete -f 03-statefulset-secret.yaml
# =============================================================================

# --- Secret ------------------------------------------------------------------
# Os valores devem estar codificados em base64.
# Decodificar para conferir:
#   [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("base64aqui"))
apiVersion: v1
kind: Secret
metadata:
  name: workshop-secret
  labels:
    app: nuxt-workshop
    version: "1.0.0"
# Opaque é o tipo padrão para dados arbitrários (chave-valor livre)
type: Opaque
data:
  # Valor original: postgresql://user:password@postgres:5432/workshop
  DATABASE_URL: cG9zdGdyZXNxbDovL3VzZXI6cGFzc3dvcmRAcG9zdGdyZXM6NTQzMi93b3Jrc2hvcA==

---

# --- Headless Service --------------------------------------------------------
# O StatefulSet exige um Headless Service (clusterIP: None) para criar
# entradas DNS individuais para cada Pod:
#   workshop-statefulset-0.workshop-headless.default.svc.cluster.local
#   workshop-statefulset-1.workshop-headless.default.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: workshop-headless
  labels:
    app: nuxt-workshop
spec:
  # clusterIP: None = sem IP virtual — o DNS resolve direto para o IP do Pod
  clusterIP: None
  selector:
    app: nuxt-workshop-statefulset
  ports:
    - port: 3000
      targetPort: 3000

---

# --- StatefulSet -------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: workshop-statefulset
  labels:
    app: nuxt-workshop-statefulset
    version: "1.0.0"
spec:
  # Referencia o Headless Service para DNS estável entre os Pods
  serviceName: workshop-headless
  replicas: 2
  selector:
    matchLabels:
      app: nuxt-workshop-statefulset
  template:
    metadata:
      labels:
        app: nuxt-workshop-statefulset
        version: "1.0.0"
    spec:
      containers:
        - name: nuxt-workshop
          image: workshop-registry.localhost:5001/nuxt-workshop:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            # secretKeyRef injeta apenas o valor da chave DATABASE_URL do Secret
            # O valor nunca aparece em texto claro no manifesto ou nos logs
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workshop-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          # volumeMount aponta para onde o PVC será montado dentro do container
          volumeMounts:
            - name: workshop-storage
              mountPath: /app/data

  # volumeClaimTemplates: cria um PVC INDIVIDUAL e exclusivo para cada Pod
  # Pod 0 → PVC workshop-storage-workshop-statefulset-0
  # Pod 1 → PVC workshop-storage-workshop-statefulset-1
  # Os PVCs sobrevivem à remoção do Pod — os dados não se perdem em reinicializações
  volumeClaimTemplates:
    - metadata:
        name: workshop-storage
      spec:
        # ReadWriteOnce: apenas um node por vez pode montar esse volume no modo escrita
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
