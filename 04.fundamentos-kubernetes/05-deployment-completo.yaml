# =============================================================================
# 05 - Deployment Completo
# =============================================================================
# Este manifesto reúne todos os recursos vistos nos exercícios anteriores.
# Múltiplos recursos no mesmo arquivo são separados por "---".
#
# Recursos neste arquivo (em ordem de criação recomendada):
#   1. ConfigMap   → configurações não-sensíveis (variáveis de ambiente)
#   2. Secret      → credenciais e dados sensíveis (DATABASE_URL)
#   3. Deployment  → gerencia o ciclo de vida dos Pods da aplicação
#   4. Service     → expõe os Pods internamente via IP virtual estável
#   5. Ingress     → roteia tráfego HTTP externo para o Service
#   6. HPA         → escala automaticamente as réplicas com base no uso de CPU
#
# Comandos úteis:
#   kubectl apply -f 05-deployment-completo.yaml
#   kubectl get all -l app=nuxt-workshop
#   kubectl get ingress
#   kubectl get hpa
#   kubectl top pods -l app=nuxt-workshop   # requer metrics-server
#   kubectl delete -f 05-deployment-completo.yaml
# =============================================================================

# --- ConfigMap ---------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: workshop-app-config
  labels:
    app: nuxt-workshop
    version: "1.0.0"
data:
  NUXT_PUBLIC_SITE_URL: "http://nuxt-workshop.local"
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "3000"
  OTEL_SERVICE_NAME: "nuxt-workshop"
  OTEL_SERVICE_VERSION: "1.0.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
  OTEL_LOG_LEVEL: "info"

---

# --- Secret ------------------------------------------------------------------
# Alternativa ao YAML: criar via kubectl para evitar o valor exibido no histórico:
#   kubectl create secret generic workshop-app-secret \
#     --from-literal=DATABASE_URL="postgresql://user:password@postgres:5432/workshop"
apiVersion: v1
kind: Secret
metadata:
  name: workshop-app-secret
  labels:
    app: nuxt-workshop
    version: "1.0.0"
type: Opaque
data:
  # Valor original: postgresql://user:password@postgres:5432/workshop
  DATABASE_URL: cG9zdGdyZXNxbDovL3VzZXI6cGFzc3dvcmRAcG9zdGdyZXM6NTQzMi93b3Jrc2hvcA==

---

# --- Deployment --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-deployment-completo
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  # Réplicas iniciais — o HPA ajustará esse número dinamicamente
  replicas: 2
  selector:
    matchLabels:
      app: nuxt-workshop
  # RollingUpdate é a estratégia padrão: substitui Pods gradualmente.
  # maxSurge: durante o update, cria até 1 Pod adicional antes de remover os antigos.
  # maxUnavailable: garante que nenhum Pod seja removido antes do novo estar pronto
  #                 → zero-downtime deployment.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nuxt-workshop
        version: "1.0.0"
    spec:
      # Impede que o processo principal rode como root no host
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000   # corresponde ao usuário "node" da imagem node:alpine
      containers:
        - name: nuxt-workshop
          image: workshop-registry.localhost:5001/nuxt-workshop:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          # Injeta todas as chaves do ConfigMap como variáveis de ambiente de uma vez
          envFrom:
            - configMapRef:
                name: workshop-app-config
          env:
            # secretKeyRef injeta apenas o valor da chave DATABASE_URL do Secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workshop-app-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # readinessProbe: o Pod só recebe tráfego do Service após retornar HTTP 200
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # livenessProbe: reinicia o container se a app travar completamente
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: false — Nuxt/Nitro grava cache em tempo de execução
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---

# --- Service -----------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: workshop-app-service
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  type: ClusterIP
  selector:
    app: nuxt-workshop
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000

---

# --- Ingress -----------------------------------------------------------------
# O Ingress roteia requisições HTTP/HTTPS externas para Services internos.
# Requer um Ingress Controller instalado no cluster.
#   k3d usa Traefik por padrão — porta 80 já está mapeada ao criar o cluster.
#
# Acesso local: adicione esta linha ao arquivo hosts do Windows:
#   C:\Windows\System32\drivers\etc\hosts
#   127.0.0.1  nuxt-workshop.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workshop-ingress
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  # ingressClassName substitui a annotation kubernetes.io/ingress.class (deprecated desde k8s 1.18)
  # "traefik" é o Ingress Controller padrão do k3d
  # Para NGINX, substitua por: ingressClassName: "nginx"
  ingressClassName: traefik
  rules:
    - host: nuxt-workshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workshop-app-service
                port:
                  number: 80

---

# --- HorizontalPodAutoscaler (HPA) ------------------------------------------
# O HPA monitora o uso de CPU dos Pods e ajusta as réplicas automaticamente
# entre minReplicas e maxReplicas conforme a demanda.
#
# Pré-requisito: metrics-server instalado no cluster.
#   k3d NÃO instala o metrics-server por padrão. Para instalar:
#     kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# Como funciona:
#   - Uso médio de CPU > 70% → aumenta réplicas (scale out)
#   - Uso médio de CPU < 70% → diminui réplicas (scale in)
#   - Nunca vai abaixo de 2 réplicas (minReplicas) nem acima de 5 (maxReplicas)
#
# Verificar o HPA em ação:
#   kubectl get hpa workshop-hpa --watch
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workshop-hpa
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workshop-deployment-completo
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Escala horizontalmente quando o uso médio de CPU ultrapassar 70%
          averageUtilization: 70
