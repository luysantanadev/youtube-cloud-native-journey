# =============================================================================
# 01 - Pod
# =============================================================================
# O Pod é a menor unidade implantável do Kubernetes.
# Encapsula um ou mais containers que compartilham rede e armazenamento.
#
# QUANDO USAR: apenas para testes rápidos e debugging pontual.
# Se o Pod cair, ele NÃO é reiniciado automaticamente.
# Para workloads reais, use sempre Deployment ou StatefulSet.
#
# Comandos úteis:
#   kubectl apply -f 01-pod.yaml
#   kubectl get pods
#   kubectl describe pod workshop-pod
#   kubectl logs workshop-pod
#   kubectl delete pod workshop-pod
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: workshop-pod
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  containers:
    - name: nuxt-workshop
      # Imagem construída no lab e importada no cluster k3d:
      #   docker build -t nuxt-workshop:1.0.0 .
      #   k3d image import nuxt-workshop:1.0.0 -c workshop
      image: workshop-registry.localhost:5001/nuxt-workshop:1.0.0
      # IfNotPresent: usa a imagem local se já estiver no node — não faz pull externo
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 3000
          protocol: TCP
      env:
        - name: NODE_ENV
          value: "production"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        # Em produção, DATABASE_URL deve vir de um Secret (ver 03-statefulset-secret.yaml)
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/workshop"
      # requests: mínimo garantido para o scheduler alocar o Pod em um node
      # limits:   máximo permitido — exceder memória causa OOMKill
      resources:
        requests:
          cpu: "100m"     # 100 milliCPU = 10% de 1 core
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
