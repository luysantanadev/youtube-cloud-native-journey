# =============================================================================
# 02 - Deployment + ConfigMap
# =============================================================================
# ConfigMap: armazena configurações não-sensíveis como pares chave-valor.
#   ⚠️ NUNCA use ConfigMap para senhas, tokens ou chaves de API — use Secret.
#   Alterações no ConfigMap SÃO refletidas nos Pods apenas após um novo rollout.
#
# Deployment: gerencia um conjunto de Pods idênticos com:
#   - Self-healing: recria Pods que caírem
#   - Rolling update: atualiza Pods gradualmente sem downtime
#   - Rollback: volta para a versão anterior com um único comando
#
# Comandos úteis:
#   kubectl apply -f 02-deployment-configmap.yaml
#   kubectl get deployments
#   kubectl get pods -l app=nuxt-workshop
#   kubectl rollout status deployment/workshop-deployment-configmap
#   kubectl rollout undo deployment/workshop-deployment-configmap
#   kubectl delete -f 02-deployment-configmap.yaml
# =============================================================================

# --- ConfigMap ---------------------------------------------------------------
# Centraliza toda a configuração não-sensível em um único objeto reutilizável.
apiVersion: v1
kind: ConfigMap
metadata:
  name: workshop-configmap
  labels:
    app: nuxt-workshop
    version: "1.0.0"
data:
  # URL pública da aplicação (usada para OG Image e links absolutos)
  NUXT_PUBLIC_SITE_URL: "http://nuxt-workshop.local"
  # Configurações de runtime do servidor Nitro/Node
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "3000"
  # Configurações do OpenTelemetry (rastreamento e observabilidade)
  OTEL_SERVICE_NAME: "nuxt-workshop"
  OTEL_SERVICE_VERSION: "1.0.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
  OTEL_LOG_LEVEL: "info"

---

# --- Deployment --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-deployment-configmap
  labels:
    app: nuxt-workshop
    version: "1.0.0"
spec:
  # Mantém 2 instâncias rodando em paralelo — se uma cair, outra já está lá
  replicas: 2
  # O selector define quais Pods pertencem a este Deployment via labels
  selector:
    matchLabels:
      app: nuxt-workshop
  template:
    metadata:
      labels:
        app: nuxt-workshop
        version: "1.0.0"
    spec:
      containers:
        - name: nuxt-workshop
          image: workshop-registry.localhost:5001/nuxt-workshop:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # envFrom injeta TODAS as chaves do ConfigMap como variáveis de ambiente
          # Equivale a declarar cada `env` manualmente, mas muito mais simples de manter
          envFrom:
            - configMapRef:
                name: workshop-configmap
          env:
            # DATABASE_URL é sensível — em produção virá de um Secret
            # (ver manifesto 03-statefulset-secret.yaml)
            - name: DATABASE_URL
              value: "postgresql://user:password@postgres:5432/workshop"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # readinessProbe: o Pod só entra no pool do Service quando retornar 200
          # Evita enviar tráfego para um Pod que ainda está inicializando
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # livenessProbe: reinicia o container se a app travar (deadlock, memória infinita)
          # Não use para detectar lentidão — isso é papel da readinessProbe
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
