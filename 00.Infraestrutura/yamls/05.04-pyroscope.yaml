# 05.04-pyroscope.yaml

pyroscope:
  replicationFactor: 1
  structuredConfig:
    ingester:
      lifecycler:
        ring:
          replication_factor: 1
    store_gateway:
      sharding_ring:
        replication_factor: 1
  storage:
    backend: filesystem
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi