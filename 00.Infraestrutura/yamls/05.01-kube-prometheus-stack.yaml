# Desabilita o que não precisamos agora
alertmanager:
  enabled: false

# Prometheus — dimensionado para 4 CPU / 8 GB (aumentar limits em maquinas com 16 GB)
prometheus:
  prometheusSpec:
    retention: 6h          # não acumula dados, é workshop
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# Grafana — já configurado com datasources via sidecar
grafana:
  adminPassword: "workshop123"  # senha local de dev — nao usar em producao
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Habilita sidecar para descobrir datasources automaticamente
  sidecar:
    datasources:
      enabled: true
      searchNamespace: monitoring

# Node exporter e kube-state-metrics já vêm habilitados por padrão
# Eles expõem métricas do cluster (nodes, pods, deployments etc)