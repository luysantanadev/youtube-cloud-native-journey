# 05.03-tempo.yaml
# Usando grafana/tempo (monolitico) — o chart tempo-distributed foi descontinuado
# Referencia: https://artifacthub.io/packages/helm/grafana/tempo
# Service name: tempo  |  Query HTTP: 3200  |  OTLP gRPC: 4317  |  OTLP HTTP: 4318

tempo:
  reportingEnabled: false

  # Padrao e 1024 MB; reduzido para nao desperdicar RAM no workshop
  memBallastSizeMbs: 64

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Habilita o metrics-generator para gerar span metrics e service graphs.
  # Necessario para Drilldown > Traces no Grafana (evita "empty ring" error).
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    processor:
      span_metrics: {}
      service_graphs:
        max_items: 10000

  # Habilita os processors para o tenant padrao (sem multitenancy).
  overrides:
    defaults:
      metrics_generator:
        processors: [service-graphs, span-metrics]

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi