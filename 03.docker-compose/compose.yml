# ==============================================================================
# compose.yml — Workshop K8s para Devs
# Demonstra como o Docker Compose substitui múltiplos "docker run" e como
# variáveis de ambiente são fornecidas de formas diferentes por serviço.
# Todos os serviços usam a mesma imagem workshop-envs:0.1.0.
#
# Comandos úteis:
#   docker compose up          — sobe todos os serviços em foreground
#   docker compose up -d       — sobe em background
#   docker compose logs -f     — acompanha os logs de todos os serviços
#   docker compose down        — para e remove os containers
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  # Serviço 1 — ambiente de desenvolvimento
  # Variáveis definidas inline no compose; modelo mais simples e direto.
  # Acesse: http://localhost:3001
  # ----------------------------------------------------------------------------
  dev:
    image: workshop-envs:0.1.0
    ports:
      - "3001:3000"
    environment:
      APP_NAME: "workshop-dev"
      APP_ENV: "development"
      APP_MESSAGE: "Rodando via Docker Compose — ambiente DEV"
      DB_HOST: "postgres:5432"
      DB_USER: "dev_user"
      DB_PASS: "dev_secret"

  # ----------------------------------------------------------------------------
  # Serviço 2 — ambiente de homologação
  # Variáveis carregadas de um arquivo .env externo com env_file.
  # Equivalente ao --env-file do docker run; separa config do compose.yml.
  # Acesse: http://localhost:3002
  # ----------------------------------------------------------------------------
  homologation:
    image: workshop-envs:0.1.0
    ports:
      - "3002:3000"
    env_file:
      - .env.hml

  # ----------------------------------------------------------------------------
  # Serviço 3 — ambiente de produção na porta 8080
  # Mistura env_file (valores base) com environment (sobrescreve só o que muda).
  # A variável PORT muda também a porta interna do Node.js.
  # Acesse: http://localhost:8080
  # ----------------------------------------------------------------------------
  production:
    image: workshop-envs:0.1.0
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      PORT: "8080"
      APP_ENV: "production"
