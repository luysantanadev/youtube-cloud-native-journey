# ==============================================================================
# compose.networks.yml — Workshop K8s para Devs
# Demonstra isolamento de rede entre ambientes usando múltiplas networks.
#
# Topologia:
#
#   [rede dev] ──── postgres-devtst ◄── psql-dev
#   [rede tst] ──── postgres-devtst ◄── psql-tst
#   [rede hom] ──── postgres-hom    ◄── psql-hom
#
#   postgres-devtst pertence a DUAS redes (dev e tst): um único banco
#   atende os dois ambientes, mas cada cliente só enxerga sua própria rede.
#
#   postgres-hom pertence SOMENTE à rede hom: psql-dev e psql-tst
#   não conseguem alcançá-lo — isolamento garantido por rede, não por firewall.
#
# Comandos úteis:
#   docker compose -f compose.networks.yml up          — sobe tudo e imprime os logs
#   docker compose -f compose.networks.yml up --build  — igual, forçando rebuild
#   docker compose -f compose.networks.yml down -v     — derruba e remove volumes
# ==============================================================================

name: workshop-networks

# ------------------------------------------------------------------------------
# Redes — uma por ambiente, sem comunicação cruzada entre elas.
# ------------------------------------------------------------------------------
networks:
  dev:
    name: workshop-net-dev
  tst:
    name: workshop-net-tst
  hom:
    name: workshop-net-hom

services:

  # ----------------------------------------------------------------------------
  # Banco compartilhado por dev e tst.
  # Conectado às duas redes para que clientes de cada ambiente o alcancem
  # usando o mesmo hostname (postgres-devtst), mas em redes isoladas.
  # Sem ports: nenhuma porta exposta ao host — acesso somente interno.
  # ----------------------------------------------------------------------------
  postgres-devtst:
    image: postgres:17-alpine
    networks:
      - dev
      - tst
    environment:
      POSTGRES_DB:       workshop
      POSTGRES_USER:     workshop
      POSTGRES_PASSWORD: devtst_secret
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus:   "0.50"
          memory: 256M
    restart: "no"

  # ----------------------------------------------------------------------------
  # Banco exclusivo de hom — isolado na rede hom.
  # psql-dev e psql-tst não conseguem alcançar este serviço.
  # ----------------------------------------------------------------------------
  postgres-hom:
    image: postgres:17-alpine
    networks:
      - hom
    environment:
      POSTGRES_DB:       workshop
      POSTGRES_USER:     workshop
      POSTGRES_PASSWORD: hom_secret
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus:   "0.50"
          memory: 256M
    restart: "no"

  # ----------------------------------------------------------------------------
  # Cliente DEV — rede dev → postgres-devtst.
  # Executa uma query, imprime o resultado nos logs e encerra.
  # PGPASSWORD evita expor a senha na linha de comando do processo.
  # ----------------------------------------------------------------------------
  psql-dev:
    image: postgres:17-alpine
    entrypoint: ["psql"]
    command:
      - "--host=postgres-devtst"
      - "--username=workshop"
      - "--dbname=workshop"
      - >-
        --command=SELECT
          'dev' AS ambiente,
          inet_server_addr() AS banco_ip,
          current_user AS usuario,
          now() AS momento;
    networks:
      - dev
    depends_on:
      postgres-devtst:
        condition: service_healthy
    environment:
      PGPASSWORD: devtst_secret
    deploy:
      resources:
        limits:
          cpus:   "0.10"
          memory: 64M
    restart: "no"

  # ----------------------------------------------------------------------------
  # Cliente TST — rede tst → postgres-devtst.
  # Mesmo banco que dev, rede diferente: tst não alcança recursos da rede dev.
  # ----------------------------------------------------------------------------
  psql-tst:
    image: postgres:17-alpine
    entrypoint: ["psql"]
    command:
      - "--host=postgres-devtst"
      - "--username=workshop"
      - "--dbname=workshop"
      - >-
        --command=SELECT
          'tst' AS ambiente,
          inet_server_addr() AS banco_ip,
          current_user AS usuario,
          now() AS momento;
    networks:
      - tst
    depends_on:
      postgres-devtst:
        condition: service_healthy
    environment:
      PGPASSWORD: devtst_secret
    deploy:
      resources:
        limits:
          cpus:   "0.10"
          memory: 64M
    restart: "no"

  # ----------------------------------------------------------------------------
  # Cliente HOM — rede hom → postgres-hom.
  # Totalmente isolado: não enxerga postgres-devtst nem as redes dev/tst.
  # ----------------------------------------------------------------------------
  psql-hom:
    image: postgres:17-alpine
    entrypoint: ["psql"]
    command:
      - "--host=postgres-hom"
      - "--username=workshop"
      - "--dbname=workshop"
      - >-
        --command=SELECT
          'hom' AS ambiente,
          inet_server_addr() AS banco_ip,
          current_user AS usuario,
          now() AS momento;
    networks:
      - hom
    depends_on:
      postgres-hom:
        condition: service_healthy
    environment:
      PGPASSWORD: hom_secret
    deploy:
      resources:
        limits:
          cpus:   "0.10"
          memory: 64M
    restart: "no"
